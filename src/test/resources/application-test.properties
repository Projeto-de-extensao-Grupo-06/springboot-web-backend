# Configuração de Banco de Dados para Testes (H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Inicialização de Scripts
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:schemaH2.sql
spring.sql.init.continue-on-error=false
# Impede que o Spring carregue o schema.sql padrão em testes
spring.sql.init.platform=h2

# Desabilitar RabbitMQ em testes
spring.rabbitmq.host=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Outros
app.env=test
spring.mail.username=test@example.com
solarize.security.bot-secret=testbotsecret
jwt.
jwt.validity=21600000